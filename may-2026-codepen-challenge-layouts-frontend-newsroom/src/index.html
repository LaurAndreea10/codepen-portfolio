<main class="news-shell">
	<section class="hero">
		<p class="eyebrow">May 2026 CodePen Challenge · Layouts</p>
		<h1>Frontend Newsroom</h1>
		<p>
			A curated editorial feed with CSS, layout experiments, design systems,
			anchor positioning, animation and modern front-end ideas.
		</p>

		<div class="hero-actions" aria-label="Feed controls">
			<label class="search-wrap">
				<span class="sr-only">Search articles</span>
				<input id="searchInput" type="search" placeholder="Search by title, source or topic..." />
			</label>

			<select id="sourceFilter" aria-label="Filter by source">
				<option value="all">All sources</option>
			</select>
		</div>
	</section>

	<section class="feed-meta" aria-label="Feed summary">
		<article>
			<strong id="articleCount">12</strong>
			<span>articles</span>
		</article>
		<article>
			<strong>2026</strong>
			<span>modern CSS</span>
		</article>
		<article>
			<strong>Layout</strong>
			<span>challenge</span>
		</article>
	</section>

	<section class="feed-grid" id="feedGrid" aria-label="Frontend news feed">

		<!-- Paste your existing .feed-item blocks here -->

	</section>
</main>
