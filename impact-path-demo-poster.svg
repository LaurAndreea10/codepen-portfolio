<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="800" gradientUnits="userSpaceOnUse">
      <stop stop-color="#051210"/>
      <stop offset="1" stop-color="#0a2a1e"/>
    </linearGradient>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#10b981"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="prog" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#10b981"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0.5" cy="0.3" r="0.55">
      <stop stop-color="#10b981" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.3" cy="0.9" r="0.4">
      <stop stop-color="#22c55e" stop-opacity="0.1"/>
      <stop offset="1" stop-color="#22c55e" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1280" height="800" fill="url(#bg)"/>
  <rect width="1280" height="800" fill="url(#glow1)"/>
  <rect width="1280" height="800" fill="url(#glow2)"/>

  <!-- Card frame -->
  <rect x="200" y="80" width="880" height="640" rx="28" fill="#071f18" stroke="#1a4d3a" stroke-opacity="0.5"/>

  <!-- Step indicator: Pas 3 / 5 -->
  <text x="240" y="132" fill="#6ee7b7" font-size="14" font-family="Inter,sans-serif" font-weight="700" letter-spacing="0.08em">PAS 3 DIN 5</text>

  <!-- Progress bar background -->
  <rect x="240" y="150" width="800" height="10" rx="5" fill="#0d3028"/>
  <!-- Progress bar fill at 60% -->
  <rect x="240" y="150" width="480" height="10" rx="5" fill="url(#prog)"/>

  <!-- Progress percentage -->
  <text x="1000" y="160" fill="#34d399" font-size="13" font-family="Inter,sans-serif" font-weight="700">60%</text>

  <!-- Step title -->
  <text x="240" y="220" fill="#ecfdf5" font-size="30" font-family="Inter,sans-serif" font-weight="800">Alege direcția potrivită</text>
  <text x="240" y="256" fill="#9db0b8" font-size="16" font-family="Inter,sans-serif" font-weight="400">Selectează opțiunea care se potrivește cel mai bine cu obiectivele tale.</text>

  <!-- Option cards -->
  <rect x="240" y="296" width="380" height="140" rx="16" fill="#0c2e24" stroke="#1a4d3a" stroke-opacity="0.5"/>
  <circle cx="276" cy="332" r="14" fill="#10b981" fill-opacity="0.25" stroke="#10b981" stroke-width="2"/>
  <rect x="304" y="324" width="180" height="14" rx="7" fill="#d1fae5" fill-opacity="0.6"/>
  <rect x="304" y="350" width="280" height="10" rx="5" fill="#6ee7b7" fill-opacity="0.25"/>
  <rect x="304" y="370" width="240" height="10" rx="5" fill="#6ee7b7" fill-opacity="0.15"/>
  <rect x="304" y="390" width="200" height="10" rx="5" fill="#6ee7b7" fill-opacity="0.1"/>

  <rect x="660" y="296" width="380" height="140" rx="16" fill="#0c2e24" stroke="#34d399" stroke-opacity="0.6" stroke-width="2"/>
  <circle cx="696" cy="332" r="14" fill="#10b981"/>
  <polygon points="690,332 694,336 704,326" fill="#fff" stroke="#fff" stroke-width="1.5" stroke-linejoin="round"/>
  <rect x="724" y="324" width="200" height="14" rx="7" fill="#d1fae5" fill-opacity="0.8"/>
  <rect x="724" y="350" width="260" height="10" rx="5" fill="#6ee7b7" fill-opacity="0.3"/>
  <rect x="724" y="370" width="220" height="10" rx="5" fill="#6ee7b7" fill-opacity="0.2"/>
  <rect x="724" y="390" width="180" height="10" rx="5" fill="#6ee7b7" fill-opacity="0.12"/>

  <!-- Additional option -->
  <rect x="240" y="456" width="380" height="140" rx="16" fill="#0c2e24" stroke="#1a4d3a" stroke-opacity="0.5"/>
  <circle cx="276" cy="492" r="14" fill="#10b981" fill-opacity="0.25" stroke="#10b981" stroke-width="2"/>
  <rect x="304" y="484" width="190" height="14" rx="7" fill="#d1fae5" fill-opacity="0.5"/>
  <rect x="304" y="510" width="260" height="10" rx="5" fill="#6ee7b7" fill-opacity="0.2"/>
  <rect x="304" y="530" width="220" height="10" rx="5" fill="#6ee7b7" fill-opacity="0.12"/>

  <!-- Step dots -->
  <circle cx="560" cy="650" r="6" fill="#34d399"/>
  <circle cx="590" cy="650" r="6" fill="#34d399"/>
  <circle cx="620" cy="650" r="6" fill="#10b981" stroke="#34d399" stroke-width="2"/>
  <circle cx="650" cy="650" r="6" fill="#1a4d3a"/>
  <circle cx="680" cy="650" r="6" fill="#1a4d3a"/>

  <!-- CTA button -->
  <rect x="480" y="674" width="280" height="48" rx="24" fill="url(#acc)"/>
  <text x="563" y="704" fill="#fff" font-size="16" font-family="Inter,sans-serif" font-weight="700">Continuă →</text>

  <!-- Play button -->
  <circle cx="640" cy="400" r="44" fill="#000" fill-opacity="0.45"/>
  <circle cx="640" cy="400" r="44" fill="none" stroke="url(#acc)" stroke-width="2" stroke-opacity="0.6"/>
  <polygon points="628,380 628,420 662,400" fill="#fff" fill-opacity="0.9"/>

  <!-- Badge -->
  <rect x="1100" y="68" width="100" height="30" rx="15" fill="#000" fill-opacity="0.6"/>
  <text x="1122" y="88" fill="#fff" font-size="12" font-family="Inter,sans-serif" font-weight="600">▶ Demo 35s</text>
</svg>
