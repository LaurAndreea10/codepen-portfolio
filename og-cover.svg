<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0b1730"/>
      <stop offset="100%" style="stop-color:#071226"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f8cff"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="20%" r="40%">
      <stop offset="0%" style="stop-color:#4f8cff;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#4f8cff;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="80%" r="40%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.16"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Grid lines -->
