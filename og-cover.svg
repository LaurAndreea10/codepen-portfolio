<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0b1730"/>
      <stop offset="100%" style="stop-color:#071226"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f8cff"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="20%">
      <stop offset="0%" style="stop-color:rgba(79,140,255,0.25)"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="80%">
      <stop offset="0%" style="stop-color:rgba(139,92,246,0.2)"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>
  <!-- Badge -->
  <rect x="80" y="80" width="80" height="80" rx="20" fill="url(#accent)"/>
  <text x="120" y="136" font-family="system-ui,sans-serif" font-size="36" font-weight="800" text-anchor="middle" fill="white">CP</text>
  <!-- Title -->
  <text x="80" y="320" font-family="system-ui,sans-serif" font-size="72" font-weight="800" fill="white" letter-spacing="-2">Laura Andreea</text>
  <text x="80" y="400" font-family="system-ui,sans-serif" font-size="48" font-weight="700" fill="#9db0d4">CodePen Portfolio</text>
  <!-- Tags -->
  <rect x="80" y="450" width="200" height="48" rx="24" fill="rgba(79,140,255,0.15)" stroke="rgba(79,140,255,0.3)" stroke-width="1"/>
  <text x="180" y="480" font-family="system-ui,sans-serif" font-size="20" text-anchor="middle" fill="#4f8cff" font-weight="700">45 Projects</text>
  <rect x="300" y="450" width="180" height="48" rx="24" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="390" y="480" font-family="system-ui,sans-serif" font-size="20" text-anchor="middle" fill="#eef4ff" font-weight="600">Live Preview</text>
  <rect x="500" y="450" width="200" height="48" rx="24" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="600" y="480" font-family="system-ui,sans-serif" font-size="20" text-anchor="middle" fill="#eef4ff" font-weight="600">Dark / Light</text>
  <!-- URL -->
  <text x="1120" y="570" font-family="system-ui,sans-serif" font-size="22" text-anchor="end" fill="#4f6283">laurandreea10.github.io/codepen-portfolio</text>
</svg>