name: Restore index after cache bust

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/restore-index-after-cache-bust.yml'
      - '.github/restore-index-trigger.txt'

permissions:
  contents: write

jobs:
  restore:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore valid index and bust Alpis script cache
        shell: bash
        run: |
          set -euo pipefail
          git checkout 863bb9b0d28f68b626775a3f04d11d95240ff8a4 -- index.html
          python3 - <<'PY'
          from pathlib import Path
          path = Path('index.html')
          html = path.read_text(encoding='utf-8')
          html = html.replace('src="alpis-video-card.js"', 'src="alpis-video-card.js?v=real-demo-2026-05-17-v3"')
          path.write_text(html, encoding='utf-8')
          PY

      - name: Commit restored index
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "fix(index): restore portfolio and bust Alpis video script cache"
          git push
