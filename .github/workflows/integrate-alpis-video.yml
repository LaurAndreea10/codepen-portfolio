name: Integrate Alpis video script

on:
  workflow_dispatch:
  push:
    paths:
      - "alpis-video-card.js"
      - ".github/workflows/integrate-alpis-video.yml"
      - ".github/alpis-video-trigger.txt"

permissions:
  contents: write

jobs:
  integrate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Inject alpis-video-card.js in index.html
        shell: bash
        run: |
          set -euo pipefail

          if grep -q 'alpis-video-card.js' index.html; then
            echo "alpis-video-card.js is already referenced in index.html"
            exit 0
          fi

          python3 - <<'PY'
          from pathlib import Path
          path = Path('index.html')
          html = path.read_text(encoding='utf-8')
          script_tag = '  <script src="alpis-video-card.js" defer></script>\n'

          if '<script src="now-section.js" defer></script>' in html:
              html = html.replace(
                  '  <script src="now-section.js" defer></script>\n',
                  '  <script src="now-section.js" defer></script>\n' + script_tag,
                  1
              )
          elif '<script src="main.js" defer></script>' in html:
              html = html.replace(
                  '  <script src="main.js" defer></script>\n',
                  '  <script src="main.js" defer></script>\n' + script_tag,
                  1
              )
          elif '</body>' in html:
              html = html.replace('</body>', script_tag + '</body>', 1)
          else:
              raise SystemExit('Could not find a safe insertion point in index.html')

          path.write_text(html, encoding='utf-8')
          PY

      - name: Commit integration
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add index.html
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "feat(alpis): load video demo card script"
          git push
