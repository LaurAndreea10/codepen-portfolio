name: Optimize Video Demos

# Rulează doar când împingi fișiere noi în media/raw/
on:
  push:
    paths:
      - 'media/raw/**'
  workflow_dispatch:  # permite rulare manuală din UI GitHub

permissions:
  contents: write  # trebuie să poată commita fișierele optimizate

jobs:
  optimize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Optimize all raw videos
        run: |
          mkdir -p media
          shopt -s nullglob

          # Caută toate fișierele *-raw.* din media/raw/
          for raw in media/raw/*-raw.*; do
            base=$(basename "$raw")
            name="${base%-raw.*}"   # ex: alpis-fusion-demo
            out_mp4="media/${name}.mp4"
            out_webm="media/${name}.webm"

            echo "🎬 Procesez: $raw → $out_mp4 + $out_webm"

            # MP4 H.264 — compatibilitate universală
            ffmpeg -y -i "$raw" \
              -vcodec libx264 -crf 28 -preset slow \
              -vf "scale=1280:-2,fps=24" \
              -an -movflags +faststart \
              "$out_mp4"

            # WebM VP9 — mai mic pentru browsere moderne
            ffmpeg -y -i "$raw" \
              -c:v libvpx-vp9 -crf 35 -b:v 0 \
              -vf "scale=1280:-2,fps=24" \
              -an \
              "$out_webm"

            echo "✅ Dimensiuni:"
            ls -lh "$out_mp4" "$out_webm" | awk '{print "   "$NF": "$5}'
          done

      - name: Commit optimized videos
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add media/*.mp4 media/*.webm 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "Nimic de commit-uit"
          else
            git commit -m "chore(media): auto-optimize video demos via FFmpeg"
            git push
          fi
