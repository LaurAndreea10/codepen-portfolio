name: Build Alpis Demo Video

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/build-alpis-demo-video.yml'
      - '.github/alpis-demo-build-trigger.txt'

permissions:
  contents: write

jobs:
  build-video:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Generate lightweight Alpis demo video
        run: |
          mkdir -p media
          ffmpeg -y \
            -f lavfi -i "color=c=0x081326:s=1280x800:d=12:r=24" \
            -vf "drawbox=x=80:y=70:w=1120:h=660:color=0x4f8cff@0.18:t=fill,drawbox=x=80:y=70:w=1120:h=660:color=0x4f8cff@0.70:t=3,drawtext=text='Alpis Fusion CRM Premium':x=120:y=115:fontsize=48:fontcolor=white,drawtext=text='Dashboard · Kanban · Flow Builder · Billing':x=120:y=180:fontsize=28:fontcolor=0xbfd0ee,drawbox=x=120:y=260:w=280:h=145:color=0x4f8cff@0.35:t=fill,drawbox=x=430:y=260:w=280:h=145:color=0x8b5cf6@0.35:t=fill,drawbox=x=740:y=260:w=280:h=145:color=0x4ade80@0.28:t=fill,drawtext=text='Lead Pipeline':x=150:y=305:fontsize=30:fontcolor=white,drawtext=text='Flow Builder':x=460:y=305:fontsize=30:fontcolor=white,drawtext=text='Actions CI/CD':x=770:y=305:fontsize=30:fontcolor=white,drawbox=x=120:y=470:w=920:h=24:color=0x4ade80@0.70:t=fill,drawbox=x=120:y=525:w=760:h=24:color=0x4f8cff@0.70:t=fill,drawbox=x=120:y=580:w=620:h=24:color=0x8b5cf6@0.70:t=fill,drawtext=text='48s demo ready for portfolio card':x=120:y=655:fontsize=26:fontcolor=0xbfd0ee" \
            -vcodec libx264 -crf 28 -preset slow -pix_fmt yuv420p -an -movflags +faststart \
            media/alpis-fusion-demo.mp4

          ffmpeg -y -i media/alpis-fusion-demo.mp4 \
            -c:v libvpx-vp9 -crf 35 -b:v 0 -an \
            media/alpis-fusion-demo.webm

      - name: Show file sizes
        run: |
          ls -lh media/alpis-fusion-demo.mp4 media/alpis-fusion-demo.webm

      - name: Commit generated videos
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add media/alpis-fusion-demo.mp4 media/alpis-fusion-demo.webm
          if git diff --cached --quiet; then
            echo "No media changes to commit."
            exit 0
          fi
          git commit -m "feat(media): build Alpis Fusion demo video assets"
          git push
