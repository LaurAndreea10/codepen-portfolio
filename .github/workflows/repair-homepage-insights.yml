name: Repair homepage insights

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rebuild index.html insights section
        run: |
          python <<'PY'
          from pathlib import Path

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')

          insights_block = '''    <section id="insights">
      <div class="container">
        <div class="section-head">
          <div>
            <span class="eyebrow">Insights</span>
            <h2>Decizii și lecții din ClientFlow PRO</h2>
            <p class="section-subtitle">4 insight-uri despre produs, arhitectură și UX din construirea unui CRM SaaS ca autodidact.</p>
          </div>
        </div>

        <div class="projects-grid insights-grid">
          <article class="project-card glass">
            <span class="tag">Lessons</span>
            <h3>3 lecții din construirea unui SaaS CRM de la zero, ca autodidact</h3>
            <p class="project-desc">ClientFlow PRO m-a învățat că un CRM este, înainte de toate, un sistem de decizii. Dashboard-ul trebuie să prioritizeze ce e critic, iar workflow-ul să lege clar pașii. Progresul real apare când treci de la feature-uri izolate la un produs coerent, end-to-end.</p>
          </article>

          <article class="project-card glass">
            <span class="tag">Architecture</span>
            <h3>De ce am trecut de la single-file HTML la Vite + React pentru Alpis Fusion</h3>
            <p class="project-desc">Alpis Fusion a pornit ca prototip rapid într-un singur fișier HTML, dar la ~1917 linii devenea greu de menținut. Migrarea la Vite + React m-a ajutat să separ layout-ul, cardurile, metricile și fluxurile în componente reutilizabile, pregătite pentru scalare și iterare mai rapidă.</p>
          </article>

          <article class="project-card glass">
            <span class="tag">UX decisions</span>
            <h3>Flow builder vs Kanban: când alegi unul și când pe celălalt</h3>
            <p class="project-desc">Kanban-ul este ideal când vrei vizibilitate imediată asupra stării curente: lead-uri, task-uri, etape și priorități. Flow builder-ul devine esențial când definești reguli și automatisme: ce se întâmplă, în ce condiții și care e pasul următor. Împreună, ele organizează munca și deciziile.</p>
          </article>

          <article class="project-card glass">
            <span class="tag">Subiecte viitoare</span>
            <h3>Ce aș dezvolta mai departe în ClientFlow PRO</h3>
            <p class="project-desc">Următorul pas este să documentez mai clar deciziile din spatele automatizărilor: când merită un flow builder, cum prioritizezi lead scoring-ul și cum păstrezi claritatea pe măsură ce CRM-ul crește în date, reguli și acțiuni.</p>
          </article>
        </div>
      </div>
    </section>'''

          start = text.find('    <section id="insights">')
          marker = '\n  </main>'

          if start == -1:
              if marker not in text:
                  raise SystemExit('Could not find </main> marker')
              text = text.replace(marker, '\n' + insights_block + marker, 1)
          else:
              end = text.find(marker, start)
              if end == -1:
                  raise SystemExit('Could not find closing </main> after insights section')
              text = text[:start] + insights_block + text[end:]

          css = '''
    #insights .insights-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px;align-items:stretch}
    #insights .project-card{height:100%}
    @media(max-width:700px){#insights .insights-grid{grid-template-columns:1fr}}
'''
          if '#insights .insights-grid' not in text:
              text = text.replace('  </style>', css + '  </style>', 1)

          path.write_text(text, encoding='utf-8')
          PY

      - name: Commit repaired insights section
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "No index.html changes to commit"
          else
            git commit -m "Repair duplicate insights paragraphs"
            git push
          fi
