name: Repair homepage insights

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/repair-homepage-insights.yml'

permissions:
  contents: write

jobs:
  repair:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Tune index.html insights copy
        run: |
          python <<'PY'
          from pathlib import Path

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')

          replacements = {
              '4 insight-uri despre produs, arhitectură și UX din construirea unui CRM SaaS ca autodidact.':
              '4 insight-uri concise despre produs, arhitectură și UX din construirea unui CRM SaaS ca autodidact.',

              'ClientFlow PRO m-a învățat că un CRM este un sistem de decizii, nu doar o interfață cu lead-uri și task-uri. Un dashboard bun prioritizează, nu afișează tot. Un workflow bun leagă acțiunile într-un flux clar. Iar pentru un autodidact, saltul real apare când treci de la proiecte izolate la un produs coerent, cu stare, date, cazuri goale și experiență end-to-end.':
              'ClientFlow PRO m-a învățat că un CRM este un sistem de decizii, nu doar o listă de lead-uri și task-uri. Un dashboard bun prioritizează, iar un workflow bun leagă acțiunile într-un flux clar. Saltul real apare când treci de la proiecte izolate la un produs coerent, cu stare, date și experiență end-to-end.',

              'Alpis Fusion a început ca prototip rapid într-un singur fișier HTML, dar la aproape 1917 linii devenea greu de întreținut. Migrarea spre Vite + React mi-a permis să separ layout-ul, cardurile, metricile și fluxurile în componente reutilizabile. A fost trecerea de la o pagină complexă la o aplicație front-end care poate crește, aceeași direcție care a susținut ClientFlow PRO.':
              'Alpis Fusion a început ca prototip rapid într-un singur fișier HTML, dar la aproape 1917 linii devenea greu de extins. Migrarea spre Vite + React mi-a permis să separ layout-ul, cardurile, metricile și fluxurile în componente reutilizabile — trecerea de la o pagină complexă la o aplicație front-end care poate crește.',

              'Kanban-ul este potrivit când utilizatorul trebuie să vadă starea curentă a muncii: lead-uri, task-uri, etape și priorități. Flow builder-ul este potrivit când utilizatorul definește reguli: ce se întâmplă automat, în ce condiții și care este următorul pas. În ClientFlow PRO, Kanban-ul organizează munca, iar Flow builder-ul organizează deciziile.':
              'Kanban-ul este potrivit când utilizatorul trebuie să vadă starea curentă: lead-uri, task-uri, etape și priorități. Flow builder-ul este potrivit când definește reguli: ce se întâmplă automat, în ce condiții și care este următorul pas. În ClientFlow PRO, Kanban-ul organizează munca, iar Flow builder-ul organizează deciziile.',

              'Următorul pas ar fi să documentez deciziile din spatele automatizărilor: când merită un flow builder, cum prioritizezi lead scoring-ul și cum construiești un sistem CRM care rămâne clar chiar și când crește numărul de date, reguli și acțiuni.':
              'Următorul pas ar fi să documentez deciziile din spatele automatizărilor: când merită un flow builder, cum prioritizezi lead scoring-ul și cum păstrezi claritatea într-un CRM care crește în date, reguli și acțiuni.'
          }

          changed = False
          for old, new in replacements.items():
              if old in text:
                  text = text.replace(old, new)
                  changed = True

          if not changed:
              raise SystemExit('No matching insights copy found to tune')

          path.write_text(text, encoding='utf-8')
          PY

      - name: Commit copy tuning
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "No index.html changes to commit"
          else
            git commit -m "Tune homepage insights copy"
            git push
          fi
# trigger: tune-copy-2026-04-25
