name: Integrate homepage insights

on:
  push:
    paths:
      - '.github/workflows/integrate-homepage-insights.yml'

permissions:
  contents: write

jobs:
  patch-homepage:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Insert insights section into homepage
        run: |
          python <<'PY'
          from pathlib import Path

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')

          if 'id="insights"' not in text:
              block = '''

    <section id="insights">
      <div class="container">
        <div class="section-head">
          <div>
            <span class="eyebrow">Insights</span>
            <h2>Decizii și lecții din ClientFlow PRO</h2>
            <p class="section-subtitle">3 insight-uri despre produs, arhitectură și UX din construirea unui CRM SaaS ca autodidact.</p>
          </div>
        </div>

        <div class="projects-grid">
          <article class="project-card glass">
            <span class="tag">Lessons</span>
            <h3>3 lecții din construirea unui SaaS CRM de la zero, ca autodidact</h3>
            <p class="project-desc">ClientFlow PRO m-a învățat că un CRM nu este doar o interfață cu lead-uri, task-uri și statistici, ci un sistem de decizii. Un dashboard bun nu afișează tot, ci prioritizează. Un workflow bun nu se bazează pe componente izolate, ci pe acțiuni care se leagă logic. Iar pentru un autodidact, saltul real apare când treci de la proiecte mici la un produs coerent, cu structură, stare, date, cazuri goale și experiență end-to-end.</p>
          </article>

          <article class="project-card glass">
            <span class="tag">Architecture</span>
            <h3>De ce am trecut de la single-file HTML la Vite + React pentru Alpis Fusion</h3>
            <p class="project-desc">Alpis Fusion a început ca un prototip rapid într-un singur fișier HTML, dar la aproape 1917 linii structura devenea greu de întreținut. Migrarea spre Vite + React mi-a permis să separ layout-ul, componentele, cardurile, metricile și fluxurile în părți reutilizabile. A fost trecerea de la o pagină complexă la o aplicație front-end care poate crește, aceeași direcție care a susținut evoluția spre ClientFlow PRO.</p>
          </article>

          <article class="project-card glass">
            <span class="tag">UX decisions</span>
            <h3>Flow builder vs Kanban: când alegi unul și când pe celălalt</h3>
            <p class="project-desc">Kanban-ul este potrivit când utilizatorul trebuie să vadă starea curentă a muncii: lead-uri, task-uri, etape și priorități. Flow builder-ul este potrivit când utilizatorul definește reguli: ce se întâmplă automat, în ce condiții și care este următorul pas. În ClientFlow PRO, Kanban-ul organizează munca, iar Flow builder-ul organizează deciziile.</p>
          </article>
        </div>
      </div>
    </section>
'''
              markers = [
                  '\n    <section id="about"',
                  '\n    <section id="contact"',
                  '\n  </main>'
              ]
              for marker in markers:
                  if marker in text:
                      text = text.replace(marker, block + marker, 1)
                      break
              else:
                  raise SystemExit('No safe insertion marker found in index.html')

              path.write_text(text, encoding='utf-8')
          PY

      - name: Remove one-time workflow and commit
        run: |
          rm .github/workflows/integrate-homepage-insights.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .github/workflows/integrate-homepage-insights.yml
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Integrate ClientFlow PRO insights on homepage"
            git push
          fi
