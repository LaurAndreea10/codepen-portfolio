name: Optimize portfolio performance once

on:
  push:
    paths:
      - '.github/workflows/optimize-performance-once.yml'

permissions:
  contents: write

jobs:
  optimize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract desktop intro and optimize critical path
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          root = Path('.')
          index_path = root / 'index.html'
          style_path = root / 'style.css'
          html = index_path.read_text(encoding='utf-8')
          critical_css = style_path.read_text(encoding='utf-8').strip()

          # Extract the large inline intro stylesheet.
          style_match = re.search(r'\n\s*<style id="intro-css">(.*?)</style>\s*', html, flags=re.S)
          if not style_match:
              raise SystemExit('intro-css block not found')
          intro_css = style_match.group(1).strip() + '\n'
          (root / 'intro.css').write_text(intro_css, encoding='utf-8')
          html = html[:style_match.start()] + '\n' + html[style_match.end():]

          # Extract all intro markup and its scripts. Mobile will never download or parse it.
          intro_start = html.find('  <div id="intro-overlay"')
          skip_links = html.find('  <div class="skip-links"', intro_start)
          if intro_start < 0 or skip_links < 0:
              raise SystemExit('intro markup boundaries not found')
          intro_fragment = html[intro_start:skip_links].strip() + '\n'
          (root / 'intro-fragment.html').write_text(intro_fragment, encoding='utf-8')

          loader_markup = '''  <div id="intro-root" aria-hidden="true"></div>
  <script src="intro-loader.js" defer></script>

'''
          html = html[:intro_start] + loader_markup + html[skip_links:]

          # Remove the old blocking stylesheet pair and inline the small critical stylesheet.
          old_css = '''  <link rel="preload" href="style.css" as="style" />
  <link rel="stylesheet" href="style.css" />'''
          critical_block = f'''  <style id="critical-css">\n{critical_css}\n  </style>
  <link rel="preload" href="style.css" as="style" />
  <link rel="stylesheet" href="style.css" media="print" onload="this.media='all'" />
  <noscript><link rel="stylesheet" href="style.css" /></noscript>'''
          if old_css not in html:
              raise SystemExit('blocking style.css links not found')
          html = html.replace(old_css, critical_block, 1)

          # Font downloads remain non-blocking and no longer swap after first paint.
          html = html.replace('family=Inter:wght@400;500&display=swap', 'family=Inter:wght@400;500&display=optional')
          html = html.replace('family=Inter:wght@400;500&display=swap', 'family=Inter:wght@400;500&display=optional')

          # Add a zero-layout-shift desktop loading cover and immediate mobile intro bypass.
          boot = '''
  <style id="intro-boot-css">
    html.intro-pending::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 2147483646;
      background: #04080f;
    }
    @media (max-width: 900px), (hover: none) and (pointer: coarse) {
      html.intro-pending::before, #intro-root, #intro-overlay, #intro-skip { display: none !important; }
      body.intro-active { overflow: visible !important; }
    }
  </style>
  <script>
    (function () {
      var desktop = window.matchMedia('(min-width: 901px) and (hover: hover) and (pointer: fine)').matches;
      var seen = false;
      try { seen = !!sessionStorage.getItem('la_intro_seen'); } catch (e) {}
      if (desktop && !seen) document.documentElement.classList.add('intro-pending');
    })();
  </script>
'''
          html = html.replace('</head>', boot + '</head>', 1)
          index_path.write_text(html, encoding='utf-8')

          loader = r'''(() => {
  'use strict';

  const desktopQuery = '(min-width: 901px) and (hover: hover) and (pointer: fine)';
  const root = document.getElementById('intro-root');
  let seen = false;
  try { seen = Boolean(sessionStorage.getItem('la_intro_seen')); } catch (_) {}

  const finish = () => document.documentElement.classList.remove('intro-pending');
  if (!root || !window.matchMedia(desktopQuery).matches || seen) {
    finish();
    return;
  }

  const css = document.createElement('link');
  css.rel = 'stylesheet';
  css.href = 'intro.css';
  css.media = desktopQuery;
  document.head.appendChild(css);

  const executeFragment = (markup) => {
    const template = document.createElement('template');
    template.innerHTML = markup;
    const fragment = template.content;
    const scripts = [...fragment.querySelectorAll('script')];
    scripts.forEach(oldScript => {
      const script = document.createElement('script');
      [...oldScript.attributes].forEach(attr => script.setAttribute(attr.name, attr.value));
      script.textContent = oldScript.textContent;
      oldScript.replaceWith(script);
    });
    root.replaceChildren(fragment);
    root.removeAttribute('aria-hidden');
    requestAnimationFrame(finish);
  };

  fetch('intro-fragment.html', { credentials: 'same-origin', cache: 'force-cache' })
    .then(response => {
      if (!response.ok) throw new Error(`Intro request failed: ${response.status}`);
      return response.text();
    })
    .then(executeFragment)
    .catch(error => {
      console.warn(error);
      finish();
      try { sessionStorage.setItem('la_intro_seen', '1'); } catch (_) {}
    });
})();
'''
          (root / 'intro-loader.js').write_text(loader, encoding='utf-8')

          # Remove this one-time workflow so it cannot run again.
          Path('.github/workflows/optimize-performance-once.yml').unlink()
          PY

      - name: Commit optimized assets
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html intro.css intro-fragment.html intro-loader.js .github/workflows/optimize-performance-once.yml
          git commit -m "perf: load cinematic intro on desktop only"
          git push
