  <text x="328" y="126" fill="#9db0d4" font-size="13" font-family="Inter,sans-serif" font-weight="600">Clienți activi</text>
  <text x="328" y="168" fill="#eef4ff" font-size="32" font-family="Inter,sans-serif" font-weight="800">247</text>
  <text x="564" y="126" fill="#9db0d4" font-size="13" font-family="Inter,sans-serif" font-weight="600">Conversie</text>
