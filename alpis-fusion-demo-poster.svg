<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="800" gradientUnits="userSpaceOnUse">
      <stop stop-color="#050d1f"/>
      <stop offset="1" stop-color="#0f1f3d"/>
    </linearGradient>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#4F8CFF"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0.15" cy="0.2" r="0.5">
      <stop stop-color="#4F8CFF" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#4F8CFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.85" cy="0.8" r="0.45">
      <stop stop-color="#8B5CF6" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1280" height="800" fill="url(#bg)"/>
  <rect width="1280" height="800" fill="url(#glow1)"/>
  <rect width="1280" height="800" fill="url(#glow2)"/>

  <!-- Dashboard frame -->
  <rect x="60" y="56" width="1160" height="688" rx="24" fill="#0c1a34" stroke="#1e3460" stroke-opacity="0.6"/>

