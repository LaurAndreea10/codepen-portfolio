<!doctype html>
<html lang="ro">
<head>
<meta charset="utf-8">
<title>Alpis Fusion CRM · Demo Reel 40s</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;height:100%;background:#0b0b0c;color:#f4f1ea;font-family:Inter,system-ui,sans-serif}
  #root{position:fixed;inset:0}
</style>
</head>
<body>
<template id="__bundler_thumbnail" data-bg-color="#faf6ef">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <rect width="1200" height="800" fill="#faf6ef"/>
    <rect x="180" y="200" width="840" height="420" rx="14" fill="#fff" stroke="#e5dfcf" stroke-width="2"/>
    <rect x="180" y="200" width="200" height="420" rx="14" fill="#f0e9d8"/>
    <circle cx="600" cy="400" r="70" fill="none" stroke="#2f8f83" stroke-width="10"/>
    <polygon points="585,370 585,430 635,400" fill="#2f8f83"/>
    <text x="600" y="710" text-anchor="middle" font-family="Fraunces, serif" font-size="44" font-style="italic" fill="#2f8f83">Alpis</text>
    <text x="600" y="755" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="16" letter-spacing="4" fill="#6b665c">DEMO REEL · 40s</text>
  </svg>
</template>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

<script type="text/babel" src="animations.jsx"></script>
<script type="text/babel" src="scenes.jsx"></script>
<script type="text/babel">
  function App() {
    return (
      <Stage width={1920} height={1080} duration={40} background={PALETTE.bg} persistKey="alpis-demo">
        <Video/>
      </Stage>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

</html>
