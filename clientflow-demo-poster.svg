<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="800" gradientUnits="userSpaceOnUse">
      <stop stop-color="#041210"/>
      <stop offset="1" stop-color="#0a2520"/>
    </linearGradient>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#34d399"/>
      <stop offset="1" stop-color="#3b82f6"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0.2" cy="0.15" r="0.5">
      <stop stop-color="#34d399" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.8" cy="0.85" r="0.45">
      <stop stop-color="#3b82f6" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1280" height="800" fill="url(#bg)"/>
  <rect width="1280" height="800" fill="url(#glow1)"/>
  <rect width="1280" height="800" fill="url(#glow2)"/>

  <!-- App frame -->
